# SPA 라우팅: /callback, /mma/... 등 클라이언트 라우트는 모두 index.html 로 폴백.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 런타임 설정 — 컨테이너 시작 시 생성되므로 절대 캐시하지 않는다
    location = /env.js {
        add_header Cache-Control "no-store";
    }

    # 정적 에셋 캐시
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
